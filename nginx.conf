server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA - alle Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caching für Assets
    location ~* \.(js|css|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
